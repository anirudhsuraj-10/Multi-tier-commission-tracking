<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tier Configuration</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; font-size: 13px;}
        th { background-color: #2c3e50; color: white; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px;}
        button { background-color: #27ae60; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%;}
    </style>
</head>
<body>
<div class="container">
    <h1>System Tier Configuration</h1>
    <table id="tierTable">
        <thead><tr><th>ID</th><th>Level</th><th>Min (₹)</th><th>Max (₹)</th><th>%</th></tr></thead>
        <tbody id="tierTableBody"></tbody>
    </table>
    <hr>
    <h2>Add New Tier Rule</h2>
    <input type="text" id="tId" placeholder="Tier ID (e.g. T4)">
    <input type="number" id="tLevel" placeholder="Level (1-5)">
    <input type="number" id="tMin" placeholder="Min Sales">
    <input type="number" id="tMax" placeholder="Max Sales">
    <input type="number" step="0.01" id="tPercent" placeholder="Pct (e.g. 0.10)">
    <button onclick="saveTier()">Save Tier Rule</button>
    <p><a href="/admin-dashboard.html">&larr; Back to Admin</a></p>
</div>

<script>
    window.onload = loadTiers;
    async function loadTiers() {
        const res = await fetch('/api/tiers');
        const tiers = await res.json();
        const tbody = document.getElementById('tierTableBody');
        tbody.innerHTML = ''; 
        tiers.forEach(t => {
            tbody.innerHTML += `<tr><td>${t.tierId}</td><td>${t.tierLevel}</td><td>₹${t.minSales}</td><td>₹${t.maxSales}</td><td>${t.commissionPct * 100}%</td></tr>`;
        });
    }

    async function saveTier() {
        const payload = {
            tierId: document.getElementById('tId').value,
            tierLevel: parseInt(document.getElementById('tLevel').value),
            minSales: parseFloat(document.getElementById('tMin').value),
            maxSales: parseFloat(document.getElementById('tMax').value),
            commissionPct: parseFloat(document.getElementById('tPercent').value)
        };

        await fetch('/api/tiers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        location.reload();
    }
</script>
</body>
</html>
