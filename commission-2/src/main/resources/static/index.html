<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM Commission System - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); text-align: center; width: 400px; }
        h1 { color: #2c3e50; margin-bottom: 10px;}
        p { color: #7f8c8d; margin-bottom: 30px; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 15px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box;}
        .btn-rep { background-color: #3498db; color: white; }
        .btn-admin { background-color: #e67e22; color: white; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Team Rocket SCM</h1>
        <p>Select your authorization level to proceed.</p>
        <a href="/rep-dashboard.html" class="btn btn-rep">Log In as Sales Representative</a>
        <a href="/admin-dashboard.html" class="btn btn-admin">Log In as Executive / Admin</a>
    </div>
</body>
</html>
